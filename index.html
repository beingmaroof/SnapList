<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapList — Your Task Manager</title>
  <meta name="description" content="SnapList is a clean, fast task manager with priorities, due dates, categories, and tags." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ======= SIDEBAR ======= -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">✓</div>
      <span class="brand-name">SnapList</span>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-group-label">Lists</p>
      <button class="nav-btn active" id="todoTab">
        <span class="nav-icon">📋</span>
        <span>Tasks</span>
        <span class="nav-count" id="todoBadge">0</span>
      </button>
      <button class="nav-btn" id="shoppingTab">
        <span class="nav-icon">🛒</span>
        <span>Shopping</span>
        <span class="nav-count" id="shoppingBadge">0</span>
      </button>
    </nav>

    <div class="sidebar-sep"></div>

    <nav class="sidebar-nav">
      <p class="nav-group-label">Data</p>
      <button class="nav-btn" id="exportJsonBtn">
        <span class="nav-icon">⬇</span>
        <span>Export JSON</span>
      </button>
      <button class="nav-btn" id="exportCsvBtn">
        <span class="nav-icon">📄</span>
        <span>Export CSV</span>
      </button>
      <button class="nav-btn" id="importBtn">
        <span class="nav-icon">⬆</span>
        <span>Import</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <label class="theme-row" for="themeSwitcher">
        <span>☀ Light</span>
        <span class="switch-track">
          <input type="checkbox" id="themeSwitcher" />
          <span class="switch-thumb"></span>
        </span>
        <span>Dark ☾</span>
      </label>
    </div>
  </aside>

  <div class="backdrop" id="backdrop"></div>

  <!-- ======= MAIN ======= -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="topbar-title">
        <h1 id="pageTitle">My Tasks</h1>
        <span class="topbar-meta" id="pageMeta">0 tasks · 0 done</span>
      </div>
      <button class="search-trigger" id="searchToggle" title="Search">
        🔍
      </button>
    </header>

    <!-- Search -->
    <div class="search-row hidden" id="searchRow">
      <input type="text" id="searchInput" class="search-input" placeholder="Search tasks…" autocomplete="off" />
      <button class="search-x" id="searchClose">✕</button>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progressLabel">0% complete</span>
    </div>

    <!-- Add Task -->
    <section class="add-card">
      <div class="quick-add">
        <input type="text" id="itemInput" class="quick-input" placeholder="What needs to be done?" autocomplete="off" />
        <button class="add-btn" id="addBtn">Add</button>
      </div>
      <div class="add-options">
        <div class="opt-field">
          <label for="prioritySelector">Priority</label>
          <select id="prioritySelector">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
        <div class="opt-field">
          <label for="dueDateInput">Due date</label>
          <input type="date" id="dueDateInput" />
        </div>
        <div class="opt-field grow">
          <label for="categorySelector">Category</label>
          <select id="categorySelector">
            <option value="">No category</option>
          </select>
        </div>
        <div class="opt-field grow">
          <label for="tagInput">Tags</label>
          <input type="text" id="tagInput" placeholder="work, home, urgent…" />
        </div>
      </div>
    </section>

    <!-- Filter & Sort bar -->
    <div class="bar">
      <div class="chips-row" id="categoryList">
        <button class="chip active" id="filterAllBtn">All</button>
        <button class="chip chip-new" id="addCategoryBtn" title="New category">+ Category</button>
      </div>
      <div class="sort-row">
        <select id="sortBy" class="sort-select">
          <option value="date">Newest</option>
          <option value="dueDate">Due date</option>
          <option value="priority">Priority</option>
          <option value="status">Status</option>
          <option value="alphabetical">A–Z</option>
        </select>
        <button class="sort-dir active" id="sortAsc">↑</button>
        <button class="sort-dir" id="sortDesc">↓</button>
        <button class="sort-reset" id="resetSort" title="Reset">✕</button>
      </div>
    </div>

    <!-- Category modal -->
    <div class="modal-bg hidden" id="categoryModal">
      <div class="modal">
        <div class="modal-head">
          <strong id="catModalTitle">New Category</strong>
          <button class="modal-x" id="cancelCategory">✕</button>
        </div>
        <div class="modal-body">
          <label for="categoryName">Name</label>
          <input type="text" id="categoryName" placeholder="e.g. Work, Personal…" />
          <label for="categoryColor" style="margin-top:12px;">Color</label>
          <div class="color-row">
            <input type="color" id="categoryColor" value="#e85d3e" />
            <div class="color-swatches" id="colorSwatches">
              <button class="swatch" style="background:#e85d3e" data-color="#e85d3e"></button>
              <button class="swatch" style="background:#f59e0b" data-color="#f59e0b"></button>
              <button class="swatch" style="background:#10b981" data-color="#10b981"></button>
              <button class="swatch" style="background:#3b82f6" data-color="#3b82f6"></button>
              <button class="swatch" style="background:#8b5cf6" data-color="#8b5cf6"></button>
              <button class="swatch" style="background:#ec4899" data-color="#ec4899"></button>
              <button class="swatch" style="background:#14b8a6" data-color="#14b8a6"></button>
              <button class="swatch" style="background:#6b7280" data-color="#6b7280"></button>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn-del hidden" id="deleteCategory">Delete</button>
          <button class="btn-cancel" id="cancelCategoryFooter">Cancel</button>
          <button class="btn-save" id="saveCategory">Save</button>
        </div>
      </div>
    </div>

    <!-- Task list -->
    <ul class="task-list" id="itemList"></ul>

    <div class="empty hidden" id="emptyState">
      <div class="empty-icon">✓</div>
      <p class="empty-title">All clear!</p>
      <p class="empty-sub">Add a task above to get started.</p>
    </div>

    <button class="clear-all-btn" id="clearAllBtn">Clear all tasks</button>

  </main>

  <input type="file" id="fileInput" accept=".json,.csv" style="display:none;" />
  <div class="toasts" id="toasts"></div>

  <script src="script.js"></script>
</body>
</html>
